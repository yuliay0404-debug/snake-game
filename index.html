<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="game-shell" aria-label="Snake game">
        <header class="hud">
          <div>
            <p class="eyebrow">Classic Snake</p>
            <h1>Snake</h1>
          </div>
          <div class="stats">
            <p>Score: <span id="score">0</span></p>
            <p>Status: <span id="status">Ready</span></p>
          </div>
        </header>

        <div class="actions">
          <button id="start-button" type="button">Start</button>
          <button id="pause-button" type="button">Pause</button>
          <button id="restart-button" type="button">Restart</button>
        </div>

        <div class="settings">
          <label for="speed-select">Speed</label>
          <select id="speed-select" aria-label="Snake speed">
            <option value="200">Slow</option>
            <option value="140" selected>Normal</option>
            <option value="90">Fast</option>
          </select>
        </div>

        <section class="board-wrap">
          <div
            id="board"
            class="board"
            role="grid"
            aria-label="Snake board"
          ></div>
          <div id="overlay" class="overlay" aria-live="polite">
            Press Start to play
          </div>
        </section>

        <section class="controls" aria-label="Touch controls">
          <button data-direction="up" type="button" aria-label="Move up">Up</button>
          <div class="controls-row">
            <button data-direction="left" type="button" aria-label="Move left">
              Left
            </button>
            <button data-direction="down" type="button" aria-label="Move down">
              Down
            </button>
            <button data-direction="right" type="button" aria-label="Move right">
              Right
            </button>
          </div>
        </section>

        <p class="help">
          Use arrow keys or WASD to move. Eat food to grow. Avoid walls and your
          own tail.
        </p>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
